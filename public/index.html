<!DOCTYPE html>
<html>
<head>
  <title>SUSU App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://js.paystack.co/v1/inline.js"></script>

  <style>
    body { font-family: Arial; background:#0f172a; margin:0; color:white; }

    .app { max-width:420px; margin:auto; min-height:100vh; display:flex; flex-direction:column; }

    header { background:#16a34a; padding:15px; text-align:center; font-weight:bold; }

    .content { padding:15px; flex:1; }

    .card { background:#1e293b; padding:15px; border-radius:10px; margin-bottom:10px; }

    input { width:100%; padding:12px; margin:5px 0; border-radius:8px; border:none; }

    button { width:100%; padding:12px; background:#22c55e; border:none; border-radius:8px; color:white; font-weight:bold; margin-top:5px; }

    .hidden { display:none; }

    .nav { display:flex; background:#1e293b; }

    .nav button { flex:1; padding:12px; background:none; border:none; color:white; }

    .active { background:#22c55e; }

    .balance { font-size:22px; text-align:center; color:#22c55e; }

    #out { text-align:center; color:yellow; }
  </style>
</head>

<body>

<div class="app">

  <header>SUSU APP 💰</header>

  <div class="content">

    <!-- AUTH -->
    <div id="auth">
      <div class="card">
        <h3>Register</h3>
        <input id="name" placeholder="Name">
        <input id="phone" placeholder="Phone">
        <input id="password" type="password" placeholder="Password">
        <button id="registerBtn">Register</button>
      </div>

      <div class="card">
        <h3>Login</h3>
        <input id="lphone" placeholder="Phone">
        <input id="lpass" type="password" placeholder="Password">
        <button id="loginBtn">Login</button>
      </div>
    </div>

    <!-- WALLET -->
    <div id="wallet" class="hidden">

      <div class="card">
        <h3>Balance</h3>
        <div class="balance" id="bal">GHS 0.00</div>
        <button id="balanceBtn">Refresh</button>
      </div>

      <div class="card">
        <h3>Deposit</h3>
        <input id="email" placeholder="Email">
        <input id="amount" placeholder="Amount">
        <button id="payBtn">Deposit</button>
      </div>

      <div class="card">
        <button id="logoutBtn">Logout</button>
      </div>

    </div>

    <p id="out"></p>

  </div>

  <div class="nav">
    <button id="tabAuth" class="active">Auth</button>
    <button id="tabWallet">Wallet</button>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>

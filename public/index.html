<!DOCTYPE html>
<html>
<head>
  <title>SUSU App</title>
  <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<style>
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    margin: 0;
    padding: 0;
    color: white;
  }

  .container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
  }

  h2 {
    text-align: center;
    color: #22c55e;
    margin-bottom: 20px;
    font-size: 26px;
  }

  h3 {
    margin-bottom: 10px;
    color: #f8fafc;
  }

  .card {
    background: rgba(30, 41, 59, 0.9);
    padding: 18px;
    border-radius: 14px;
    margin-bottom: 15px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    backdrop-filter: blur(6px);
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #0f172a;
    color: white;
    border: 1px solid #334155;
    transition: 0.2s;
  }

  input:focus {
    border-color: #22c55e;
    box-shadow: 0 0 5px #22c55e;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: linear-gradient(90deg, #22c55e, #16a34a);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
  }

  button:hover {
    transform: scale(1.02);
    opacity: 0.95;
  }

  button:active {
    transform: scale(0.98);
  }

  .hidden {
    display: none;
  }

  .balance {
    font-size: 26px;
    text-align: center;
    font-weight: bold;
    color: #22c55e;
    margin: 10px 0;
  }

  #out {
    text-align: center;
    margin-top: 10px;
    color: #facc15;
    font-weight: 500;
  }

  /* MOBILE RESPONSIVE */
  @media (max-width: 500px) {
    .container {
      padding: 15px;
    }

    h2 {
      font-size: 22px;
    }
  }
</style>
<body>

<h2>SUSU App</h2>

<h3>Register</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>

<h3>Login</h3>
<input id="lphone" placeholder="phone">
<input id="lpass" type="password" placeholder="password">
<button onclick="login()">Login</button>

<h3>Deposit</h3>
<input id="email">
<input id="amount">
<button onclick="pay()">Pay</button>

<h3>Wallet</h3>
<button onclick="balance()">Check Balance</button>

<p id="out"></p>

<script src="app.js"></script>

</body>
</html>
